<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dummy Text Generator</title>
    <meta name="description" content="A lightweight browser-based Lorem Ipsum generator" />
    <meta property="og:title"       content="Dummy Text" />
    <meta property="og:description" content="A lightweight browser-based Lorem Ipsum generator" />
    <meta property="og:type"        content="website" />
    <link rel="stylesheet" type="text/css" href="assets/css/tailwind.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script defer src="assets/js/alpine.min.js"></script>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0f0f0f" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png" />
</head>
<body
    x-data="dummyTextApp()"
    x-cloak
    class="font-mono text-[13px] min-h-screen"
>
<div class="max-w-lg mx-auto px-4 py-12">
    <div class="mb-8">
      <div class="flex items-center justify-between mb-1">
        <div class="flex items-center gap-2.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <span class="text-lg font-medium tracking-tight" x-text="t.title"></span>
        </div>
        <button
          @click="toggleLang()"
          class="btn-secondary text-[11px] px-2.5 py-1 rounded-md"
          x-text="lang === 'it' ? 'EN' : 'IT'"
          title="Switch language"
        ></button>
      </div>
    </div>
    <div class="card mb-4 space-y-5">
      <div>
        <label class="label mb-2" x-text="t.mode"></label>
        <div class="grid grid-cols-4 gap-2">
          <template x-for="mode in modes" :key="mode.value">
            <button
              @click="selectedMode = mode.value"
              :class="['mode-btn rounded-lg py-2 px-1 text-[11px] font-medium text-center', selectedMode === mode.value ? 'active' : '']"
              x-text="t[mode.labelKey]">
            </button>
          </template>
        </div>
      </div>
      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="label" x-text="t.quantity"></label>
          <span class="text-[10px] text-muted" x-text="currentModeUnit"></span>
        </div>
        <div class="flex items-center gap-2">
          <button
            @click="quantity = Math.max(1, quantity - stepAmount)"
            class="btn-secondary w-9 h-9 rounded-lg flex items-center justify-center font-bold text-lg"
          >-</button>
          <input
            type="number"
            x-model.number="quantity"
            min="1"
            :max="currentMax"
            class="field flex-1 h-9 rounded-lg text-center font-medium py-2"
          />
          <button
            @click="quantity = Math.min(currentMax, quantity + stepAmount)"
            class="btn-secondary w-9 h-9 rounded-lg flex items-center justify-center font-bold text-lg"
          >+</button>
        </div>
        <div class="flex gap-2 mt-2">
          <template x-for="preset in currentPresets" :key="preset">
            <button
              @click="quantity = preset"
              :class="['preset-btn flex-1 py-1.5 rounded-lg text-[11px] font-medium', quantity === preset ? 'active' : '']"
              x-text="preset">
            </button>
          </template>
        </div>
      </div>
      <button
        @click="generate()"
        class="btn-primary h-10 w-full rounded-lg font-medium"
      >
        <span x-text="t.generateText"></span>
      </button>
      <div
        x-show="generatedText"
        x-transition:enter="transition ease-out duration-150"
        x-transition:enter-start="opacity-0 -translate-y-1"
        x-transition:enter-end="opacity-100 translate-y-0"
      >
        <div class="flex items-center justify-between mb-2">
          <label class="label" x-text="t.output"></label>
          <span class="text-[10px] text-muted" x-text="statsLabel"></span>
        </div>
        <textarea
          :value="generatedText"
          readonly
          rows="7"
          class="field output-area w-full rounded-lg px-3 py-2.5 select-text"
        ></textarea>
        <button
          @click="copyText()"
          class="btn-secondary mt-2 h-10 w-full rounded-lg text-[12px] flex items-center justify-center gap-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <span x-text="isCopied ? t.textCopied : t.copyText"></span>
        </button>
      </div>
    </div>
    <div class="divider pt-5 flex items-center justify-center text-[11px]">
      <span class="text-muted" style="opacity:0.7">
        <span x-text="t.madeWith"></span>
        <a href="https://claude.ai" target="_blank" rel="noopener" class="footer-link">Claude</a>
        (Anthropic)
      </span>
    </div>
</div>
<script src="assets/js/app.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/dummy-text/sw.js');
    }
</script>
</body>
</html>
